services:

  config-server:
    image: nicest12/config-server:v2
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8888
    ports:
      - "8888:8888"
    networks:
      petclinic-network:
        aliases:
          - config-server
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8888/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  discovery-server:
    image: nicest12/discovery-server:v2
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8761
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
    ports:
      - "8761:8761"
    networks:
      petclinic-network:
        aliases:
          - discovery-server
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s

  customers-service:
    image: nicest12/customers-service:v2
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - petclinic-network

  visits-service:
    image: nicest12/visits-service:v2
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks:
      - petclinic-network

  vets-service:
    image: nicest12/vets-service:v2
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8083
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8083:8083"
    networks:
      - petclinic-network

  api-gateway:
    image: nicest12/api-gateway:v2
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_ZIPKIN_ENABLED: false
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://tracing-server:9411/api/v2/spans
      JAVA_OPTS: -XX:MaxRAMPercentage=75 -XX:+UseContainerSupport
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - petclinic-network

  admin-server:
    image: nicest12/admin-server:v2
    restart: on-failure
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 9090
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "9090:9090"
    networks:
      - petclinic-network

  tracing-server:
    image: openzipkin/zipkin:3
    restart: on-failure
    ports:
      - "9411:9411"
    networks:
      - petclinic-network

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - petclinic-network

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - petclinic-network

networks:
  petclinic-network:
    driver: bridge
