---
# visits-service local test
apiVersion: apps/v1
kind: Deployment
metadata:
  name: visits-service
  namespace: petclinic-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: visits-service
  template:
    metadata:
      labels:
        app: visits-service
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: visits-service
          image: 989800606347.dkr.ecr.us-east-1.amazonaws.com/petclinic/visits-service:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"           # no mysql profile = uses in-memory HSQLDB
            - name: CONFIG_SERVER_URL
              value: "http://localhost:8888"  # will fail gracefully (optional config)
---
apiVersion: v1
kind: Service
metadata:
  name: visits-service
  namespace: petclinic-test
spec:
  selector:
    app: visits-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
---
# api-gateway local test
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: petclinic-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: api-gateway
          image: 989800606347.dkr.ecr.us-east-1.amazonaws.com/petclinic/api-gateway:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: CONFIG_SERVER_URL
              value: "http://localhost:8888"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: petclinic-test
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: NodePort       # NodePort lets you hit it from your browser
